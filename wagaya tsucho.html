<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>わが家の通帳</title>
<style>
  :root {
    --bg: #f5f0e8;
    --surface: rgba(255,255,255,0.88);
    --surface2: rgba(255,255,255,0.70);
    --border: rgba(0,0,0,0.10);
    --text: #1a1a1a;
    --text2: #666;
    --accent: #2c5f8a;
    --accent2: #e8734a;
    --green: #3a7d44;
    --red: #c0392b;
    --yellow: #e6a817;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: var(--bg-image, none);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index: -2;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: var(--bg-overlay, rgba(245,240,232,0.85));
    z-index: -1;
  }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(44,95,138,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: white;
    padding: 14px 16px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header-title { font-size: 18px; font-weight: 700; letter-spacing: 0.05em; }
  .header-sub { font-size: 11px; opacity: 0.75; margin-top: 1px; }
  .header-balance { text-align: right; }
  .header-balance .amount { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .header-balance .label { font-size: 10px; opacity: 0.75; }

  /* Nav */
  .nav {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    z-index: 100;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 0 8px;
    font-size: 10px;
    color: #999;
    border: none;
    background: none;
    cursor: pointer;
    gap: 3px;
    transition: color 0.2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; }
  .nav-btn .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent2);
    position: absolute;
    top: 6px; right: calc(50% - 16px);
    display: none;
  }
  .nav-btn.has-dot { position: relative; }
  .nav-btn.has-dot .dot { display: block; }

  /* Main content */
  .main { padding: 12px 12px calc(70px + env(safe-area-inset-bottom)) 12px; }

  /* Cards */
  .card {
    background: var(--surface);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 12px;
  }
  .card-header {
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* FAB */
  .fab {
    position: fixed;
    bottom: calc(62px + env(safe-area-inset-bottom) + 16px);
    right: 16px;
    z-index: 90;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--accent2);
    color: white;
    border: none;
    font-size: 26px;
    box-shadow: 0 4px 16px rgba(232,115,74,0.4);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .fab:active { transform: scale(0.94); box-shadow: 0 2px 8px rgba(232,115,74,0.3); }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: white;
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-height: 90dvh;
    overflow-y: auto;
    padding: 0 16px calc(20px + env(safe-area-inset-bottom));
    transform: translateY(100%);
    transition: transform 0.25s cubic-bezier(0.32,0.72,0,1);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle {
    width: 36px; height: 4px;
    background: #ddd;
    border-radius: 2px;
    margin: 12px auto 16px;
  }
  .modal-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 16px;
    text-align: center;
  }

  /* Form */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; color: var(--text2); margin-bottom: 5px; display: block; }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #ddd;
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    background: #fafafa;
    color: var(--text);
    appearance: none;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--accent);
    background: white;
  }
  .form-textarea { resize: vertical; min-height: 72px; }

  .toggle-row {
    display: flex;
    background: #f0f0f0;
    border-radius: 10px;
    padding: 3px;
  }
  .toggle-btn {
    flex: 1;
    padding: 8px;
    border: none;
    background: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .toggle-btn.active-expense { background: white; color: var(--red); box-shadow: 0 1px 4px rgba(0,0,0,0.12); }
  .toggle-btn.active-income { background: white; color: var(--green); box-shadow: 0 1px 4px rgba(0,0,0,0.12); }

  .cats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .cat-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 8px 4px;
    border-radius: 10px;
    border: 2px solid transparent;
    background: #f5f5f5;
    cursor: pointer;
    font-size: 11px;
    color: var(--text2);
    transition: all 0.15s;
  }
  .cat-btn .emoji { font-size: 22px; }
  .cat-btn.selected { border-color: var(--accent); background: rgba(44,95,138,0.08); color: var(--accent); }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.15s;
  }
  .btn-primary:active { opacity: 0.85; }
  .btn-danger {
    background: var(--red);
  }

  /* Ledger list */
  .ledger-item {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  .ledger-item:last-child { border-bottom: none; }
  .ledger-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .ledger-icon.expense { background: rgba(192,57,43,0.10); }
  .ledger-icon.income { background: rgba(58,125,68,0.10); }
  .ledger-meta { flex: 1; min-width: 0; }
  .ledger-cat { font-size: 13px; font-weight: 600; }
  .ledger-note { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .ledger-right { text-align: right; flex-shrink: 0; }
  .ledger-amount { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .ledger-amount.expense { color: var(--red); }
  .ledger-amount.income { color: var(--green); }
  .ledger-date { font-size: 11px; color: var(--text2); margin-top: 1px; }

  /* Summary */
  .summary-row {
    display: flex;
    justify-content: space-around;
    padding: 14px;
    gap: 8px;
  }
  .summary-item { text-align: center; flex: 1; }
  .summary-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .summary-val { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .summary-val.expense { color: var(--red); }
  .summary-val.income { color: var(--green); }
  .summary-val.balance { color: var(--accent); }

  /* Charts */
  .chart-container { padding: 12px 14px; }
  canvas { max-width: 100%; }

  /* Donut */
  .donut-wrap {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px;
    flex-wrap: wrap;
  }
  .donut-canvas { flex-shrink: 0; }
  .donut-legend { flex: 1; min-width: 120px; }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    font-size: 12px;
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* Calendar */
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
  }
  .cal-nav button {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    padding: 4px 10px;
    color: var(--accent);
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    padding: 0 8px 12px;
  }
  .cal-dow {
    text-align: center;
    font-size: 10px;
    color: var(--text2);
    padding: 4px 0;
    font-weight: 600;
  }
  .cal-day {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 12px;
    padding: 2px;
    transition: background 0.15s;
    position: relative;
  }
  .cal-day:active { background: rgba(0,0,0,0.08); }
  .cal-day.today { background: rgba(44,95,138,0.12); font-weight: 700; }
  .cal-day.has-data { background: rgba(232,115,74,0.08); }
  .cal-day.selected { background: var(--accent) !important; color: white; }
  .cal-day .cal-amt { font-size: 9px; color: var(--red); margin-top: 1px; }
  .cal-day.selected .cal-amt { color: rgba(255,255,255,0.85); }
  .cal-day .memo-dot {
    position: absolute;
    top: 3px; right: 3px;
    width: 5px; height: 5px;
    background: var(--yellow);
    border-radius: 50%;
  }
  .cal-day.selected .memo-dot { background: white; }
  .cal-detail {
    padding: 12px 14px;
    border-top: 1px solid var(--border);
  }

  /* Settings */
  .settings-section { padding: 14px; border-bottom: 1px solid var(--border); }
  .settings-section:last-child { border-bottom: none; }
  .settings-title { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 12px; }
  .settings-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .settings-item:last-child { margin-bottom: 0; }
  .tag-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #f0f0f0;
    border-radius: 20px;
    padding: 5px 10px;
    font-size: 13px;
    margin: 3px;
  }
  .chip-del {
    background: none;
    border: none;
    cursor: pointer;
    color: #999;
    font-size: 14px;
    line-height: 1;
    padding: 0 0 0 2px;
  }

  /* Todo */
  .todo-list-section { padding: 14px; border-bottom: 1px solid var(--border); }
  .todo-list-section:last-child { border-bottom: none; }
  .todo-list-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .todo-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .todo-item:last-child { border-bottom: none; }
  .todo-check {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid #ccc;
    background: none;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .todo-check.checked { background: var(--green); border-color: var(--green); color: white; font-size: 12px; }
  .todo-text {
    flex: 1;
    font-size: 14px;
    line-height: 1.4;
  }
  .todo-text.done { text-decoration: line-through; color: #aaa; }
  .todo-del {
    background: none;
    border: none;
    color: #ccc;
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
  }
  .todo-input-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .todo-input-row input {
    flex: 1;
    padding: 9px 12px;
    border: 1.5px solid #ddd;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  .todo-input-row input:focus { border-color: var(--accent); }
  .todo-add-btn {
    padding: 9px 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  /* Background picker */
  .bg-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 4px 0;
  }
  .bg-option {
    aspect-ratio: 16/9;
    border-radius: 10px;
    cursor: pointer;
    border: 3px solid transparent;
    overflow: hidden;
    position: relative;
    transition: border-color 0.15s;
  }
  .bg-option.selected { border-color: var(--accent); }
  .bg-option img, .bg-option canvas { width: 100%; height: 100%; object-fit: cover; display: block; }
  .bg-option .bg-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.4);
    color: white;
    font-size: 10px;
    text-align: center;
    padding: 3px;
  }
  .bg-upload-btn {
    aspect-ratio: 16/9;
    border-radius: 10px;
    border: 2px dashed #ccc;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 11px;
    color: #999;
    gap: 4px;
    transition: border-color 0.15s;
  }
  .bg-upload-btn:hover { border-color: var(--accent); color: var(--accent); }

  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px 0;
  }
  .month-nav button { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--accent); padding: 4px 8px; }
  .month-nav span { font-size: 15px; font-weight: 600; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text2);
    font-size: 14px;
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 10px; }

  .badge {
    display: inline-block;
    background: var(--accent2);
    color: white;
    border-radius: 10px;
    padding: 2px 7px;
    font-size: 11px;
    font-weight: 700;
    margin-left: 6px;
  }

  .tab-hidden { display: none !important; }

  .section-select {
    display: flex;
    gap: 8px;
    padding: 10px 14px 0;
    flex-wrap: wrap;
  }
  .section-tab {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid #ddd;
    background: none;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .section-tab.active { background: var(--accent); border-color: var(--accent); color: white; }

  .fixed-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 13px;
  }
  .fixed-item:last-child { border-bottom: none; }
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loadingScreen" style="position:fixed;inset:0;z-index:9999;background:rgba(44,95,138,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;gap:16px">
  <div style="font-size:48px">📒</div>
  <div style="font-size:18px;font-weight:700">わが家の通帳</div>
  <div style="font-size:13px;opacity:0.75">データを読み込み中…</div>
  <div style="width:40px;height:40px;border:3px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite"></div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<header class="header">
  <div>
    <div class="header-title">📒 わが家の通帳</div>
    <div class="header-sub" id="headerMonth"></div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
    <div id="syncIndicator" style="font-size:10px;color:rgba(255,255,255,0.7);opacity:0;transition:opacity 0.5s">✓ 保存済み</div>
    <div class="header-balance">
      <div class="balance label" style="font-size:10px;opacity:.75">今月の収支</div>
      <div class="amount" id="headerBalance">¥0</div>
    </div>
  </div>
</header>

<!-- FAB -->
<button class="fab" id="fabBtn" onclick="openAddModal()" title="記録を追加">＋</button>

<!-- Bottom Nav -->
<nav class="nav">
  <button class="nav-btn active" onclick="switchTab('ledger',this)" id="nav-ledger">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="12" y2="16"/></svg>
    台帳
  </button>
  <button class="nav-btn" onclick="switchTab('summary',this)" id="nav-summary">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
    集計
  </button>
  <button class="nav-btn" onclick="switchTab('calendar',this)" id="nav-calendar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    カレンダー
  </button>
  <button class="nav-btn has-dot" onclick="switchTab('todo',this)" id="nav-todo">
    <span class="dot"></span>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    リスト
  </button>
  <button class="nav-btn" onclick="switchTab('settings',this)" id="nav-settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    設定
  </button>
</nav>

<!-- Main -->
<main class="main">

  <!-- 台帳 Tab -->
  <div id="tab-ledger">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>

<script>
// ========== SHARED STORAGE ==========
const STORAGE_KEY = 'wagaya_main';

const defaultState = {
  records: [],
  fixedItems: [],
  dayMemos: {},
  todoLists: [
    { id: 'shopping', icon: '🛒', name: '買い物リスト', items: [] },
    { id: 'todo', icon: '✅', name: 'ToDoリスト', items: [] }
  ],
  categories: {
    expense: [
      {id:'food', icon:'🍱', name:'食費'},
      {id:'daily', icon:'🧴', name:'日用品'},
      {id:'util', icon:'💡', name:'光熱費'},
      {id:'medical', icon:'💊', name:'医療'},
      {id:'transport', icon:'🚃', name:'交通費'},
      {id:'entertain', icon:'🎭', name:'娯楽'},
      {id:'clothing', icon:'👕', name:'衣類'},
      {id:'other_exp', icon:'📦', name:'その他'},
    ],
    income: [
      {id:'salary', icon:'💼', name:'給与'},
      {id:'side', icon:'💻', name:'副収入'},
      {id:'other_inc', icon:'🎁', name:'その他収入'},
    ]
  },
  bgPreset: 'none',
  bgImage: null,
  currentMonth: new Date().toISOString().slice(0,7)
};

let state = JSON.parse(JSON.stringify(defaultState));
let isSaving = false;
let lastSyncHash = '';

async function loadData() {
  try {
    const result = await window.storage.get(STORAGE_KEY, true);
    if (result && result.value) {
      const loaded = JSON.parse(result.value);
      state = Object.assign({}, defaultState, loaded);
      if (!state.todoLists) state.todoLists = defaultState.todoLists;
      if (!state.dayMemos) state.dayMemos = {};
      if (!state.categories) state.categories = defaultState.categories;
      if (!state.categories.expense) state.categories.expense = defaultState.categories.expense;
      if (!state.categories.income) state.categories.income = defaultState.categories.income;
      lastSyncHash = result.value;
    }
  } catch(e) {
    // 初回：デフォルト状態のまま
  }
}

async function saveData() {
  if (isSaving) return;
  isSaving = true;
  try {
    const json = JSON.stringify(state);
    await window.storage.set(STORAGE_KEY, json, true);
    lastSyncHash = json;
    showSyncIndicator();
  } catch(e) {
    console.error('Save failed', e);
  } finally {
    isSaving = false;
  }
}

// 30秒ごとに他の端末の変更を自動取得
async function syncFromCloud() {
  try {
    const result = await window.storage.get(STORAGE_KEY, true);
    if (result && result.value && result.value !== lastSyncHash) {
      const loaded = JSON.parse(result.value);
      state = Object.assign({}, defaultState, loaded);
      if (!state.todoLists) state.todoLists = defaultState.todoLists;
      if (!state.dayMemos) state.dayMemos = {};
      lastSyncHash = result.value;
      // 表示中のタブを再描画
      if (activeTab === 'ledger') renderLedger();
      if (activeTab === 'summary') renderSummary();
      if (activeTab === 'calendar') renderCalendar();
      if (activeTab === 'todo') renderTodo();
      updateHeader();
      showSyncIndicator('🔄 同期しました');
    }
  } catch(e) {}
}
setInterval(syncFromCloud, 30000);

function showSyncIndicator(msg) {
  const el = document.getElementById('syncIndicator');
  if (!el) return;
  el.textContent = msg || '✓ 保存済み';
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 2000);
}

// current view month
let viewMonth = state.currentMonth || new Date().toISOString().slice(0,7);
let calMonth = viewMonth;
let selectedCalDay = null;
let currentType = 'expense';
let fixedType = 'expense';
let selectedCat = null;
let fixedSelectedCat = null;
let summaryView = 'donut';

// ========== UTILS ==========
function fmt(n) {
  return (n >= 0 ? '¥' : '-¥') + Math.abs(Math.round(n)).toLocaleString('ja-JP');
}
function today() { return new Date().toISOString().slice(0,10); }
function monthLabel(ym) {
  const [y,m] = ym.split('-');
  return `${y}年${parseInt(m)}月`;
}
function getMonthRecords(ym) {
  return state.records.filter(r => r.date && r.date.startsWith(ym));
}
function getDayRecords(date) {
  return state.records.filter(r => r.date === date);
}
function getCat(type, id) {
  return (state.categories[type] || []).find(c => c.id === id) || {icon:'📦',name:'その他'};
}

// ========== FIXED ITEMS AUTO-ADD ==========
function applyFixedItems() {
  const ym = new Date().toISOString().slice(0,7);
  const alreadyApplied = state.records.some(r => r.isFixed && r.date && r.date.startsWith(ym));
  if (alreadyApplied) return;
  state.fixedItems.forEach(fi => {
    const day = String(fi.day).padStart(2,'0');
    const date = `${ym}-${day}`;
    state.records.push({
      id: 'f_' + fi.id + '_' + ym,
      date, amount: fi.amount, type: fi.type,
      catId: fi.catId, memo: fi.name + '（自動）',
      isFixed: true
    });
  });
  saveData();
}

// ========== TABS ==========
let activeTab = 'ledger';
function switchTab(tab, btn) {
  document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('tab-hidden'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.remove('tab-hidden');
  btn.classList.add('active');
  activeTab = tab;
  document.getElementById('fabBtn').style.display = (tab === 'ledger' || tab === 'calendar') ? 'flex' : 'none';
  if (tab === 'ledger') renderLedger();
  if (tab === 'summary') renderSummary();
  if (tab === 'calendar') renderCalendar();
  if (tab === 'todo') renderTodo();
  if (tab === 'settings') renderSettings();
}

// ========== MONTH NAV ==========
function changeMonth(d) {
  const [y,m] = viewMonth.split('-').map(Number);
  const dt = new Date(y, m - 1 + d);
  viewMonth = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;
  state.currentMonth = viewMonth;
  saveData(); // fire-and-forget async
  renderLedger();
  if (activeTab === 'summary') renderSummary();
  updateHeader();
}
function changeCalMonth(d) {
  const [y,m] = calMonth.split('-').map(Number);
  const dt = new Date(y, m - 1 + d);
  calMonth = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;
  selectedCalDay = null;
  renderCalendar();
}

// ========== HEADER ==========
function updateHeader() {
  document.getElementById('headerMonth').textContent = monthLabel(viewMonth);
  const recs = getMonthRecords(viewMonth);
  const income = recs.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
  const expense = recs.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
  const bal = income - expense;
  const el = document.getElementById('headerBalance');
  el.textContent = fmt(bal);
  el.style.color = bal >= 0 ? '#7ecf88' : '#f08a7a';
  document.getElementById('ledgerMonthLabel').textContent = monthLabel(viewMonth);
  document.getElementById('summaryMonthLabel').textContent = monthLabel(viewMonth);
}

// ========== LEDGER ==========
function renderLedger() {
  updateHeader();
  const recs = getMonthRecords(viewMonth).sort((a,b) => b.date.localeCompare(a.date));
  const income = recs.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
  const expense = recs.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
  const bal = income - expense;

  document.getElementById('ledgerSummary').innerHTML = `
    <div class="summary-item"><div class="summary-label">収入</div><div class="summary-val income">${fmt(income)}</div></div>
    <div class="summary-item"><div class="summary-label">支出</div><div class="summary-val expense">${fmt(expense)}</div></div>
    <div class="summary-item"><div class="summary-label">収支</div><div class="summary-val balance">${fmt(bal)}</div></div>
  `;

  if (recs.length === 0) {
    document.getElementById('ledgerList').innerHTML = `<div class="empty-state"><div class="icon">📭</div>この月の記録はありません<br><small>右下の ＋ から追加できます</small></div>`;
    return;
  }

  let html = '';
  recs.forEach(r => {
    const cat = getCat(r.type, r.catId);
    const d = r.date ? r.date.slice(5).replace('-','/') : '';
    html += `<div class="ledger-item">
      <div class="ledger-icon ${r.type}">${cat.icon}</div>
      <div class="ledger-meta">
        <div class="ledger-cat">${cat.name}</div>
        <div class="ledger-note">${r.memo || '　'}</div>
      </div>
      <div class="ledger-right">
        <div class="ledger-amount ${r.type}">${r.type==='expense'?'-':'+'} ${fmt(r.amount)}</div>
        <div class="ledger-date">${d}</div>
      </div>
      <button onclick="deleteRecord('${r.id}')" style="background:none;border:none;color:#ddd;font-size:18px;cursor:pointer;padding:4px;flex-shrink:0">×</button>
    </div>`;
  });
  document.getElementById('ledgerList').innerHTML = html;
}

function deleteRecord(id) {
  if (!confirm('この記録を削除しますか？')) return;
  state.records = state.records.filter(r => r.id !== id);
  saveData();
  renderLedger();
  updateHeader();
}

// ========== ADD RECORD MODAL ==========
function openAddModal(prefillDate) {
  currentType = 'expense';
  selectedCat = null;
  document.getElementById('addDate').value = prefillDate || today();
  document.getElementById('addAmount').value = '';
  document.getElementById('addMemo').value = '';
  document.getElementById('typeExpense').className = 'toggle-btn active-expense';
  document.getElementById('typeIncome').className = 'toggle-btn';
  renderAddCats();
  openModal('addModal');
}
function setType(t) {
  currentType = t;
  selectedCat = null;
  document.getElementById('typeExpense').className = 'toggle-btn' + (t==='expense'?' active-expense':'');
  document.getElementById('typeIncome').className = 'toggle-btn' + (t==='income'?' active-income':'');
  renderAddCats();
}
function renderAddCats() {
  const cats = state.categories[currentType] || [];
  document.getElementById('addCatsGrid').innerHTML = cats.map(c =>
    `<button class="cat-btn ${selectedCat===c.id?'selected':''}" onclick="selectCat('${c.id}')">
      <span class="emoji">${c.icon}</span><span>${c.name}</span>
    </button>`
  ).join('');
}
function selectCat(id) {
  selectedCat = id;
  renderAddCats();
}
function saveRecord() {
  const date = document.getElementById('addDate').value;
  const amount = parseInt(document.getElementById('addAmount').value);
  const memo = document.getElementById('addMemo').value.trim();
  if (!date || !amount || amount <= 0) { alert('日付と金額を入力してください'); return; }
  if (!selectedCat) { alert('カテゴリを選択してください'); return; }
  state.records.push({
    id: Date.now().toString(),
    date, amount, type: currentType,
    catId: selectedCat, memo
  });
  saveData();
  closeModal('addModal');
  renderLedger();
  updateHeader();
}

// ========== SUMMARY ==========
function setSummaryView(v, btn) {
  summaryView = v;
  document.querySelectorAll('.section-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSummary();
}
function renderSummary() {
  const recs = getMonthRecords(viewMonth);
  const el = document.getElementById('summaryContent');
  if (summaryView === 'donut') {
    const expense = recs.filter(r=>r.type==='expense');
    if (expense.length === 0) { el.innerHTML = `<div class="empty-state"><div class="icon">📊</div>支出記録がありません</div>`; return; }
    const totals = {};
    expense.forEach(r => { totals[r.catId] = (totals[r.catId]||0) + r.amount; });
    const total = Object.values(totals).reduce((s,v)=>s+v,0);
    const colors = ['#2c5f8a','#e8734a','#3a7d44','#e6a817','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316','#a855f7'];
    const entries = Object.entries(totals).sort((a,b)=>b[1]-a[1]);
    const size = 120;
    let html = `<div class="donut-wrap"><canvas class="donut-canvas" width="${size}" height="${size}" id="donutCanvas"></canvas><div class="donut-legend">`;
    entries.forEach(([id,amt],i) => {
      const cat = getCat('expense', id);
      html += `<div class="legend-item"><div class="legend-dot" style="background:${colors[i%colors.length]}"></div><div>${cat.icon} ${cat.name}<br><small style="color:var(--text2)">${fmt(amt)} (${Math.round(amt/total*100)}%)</small></div></div>`;
    });
    html += `</div></div>`;
    el.innerHTML = html;
    // Draw donut
    const canvas = document.getElementById('donutCanvas');
    const ctx = canvas.getContext('2d');
    const cx = size/2, cy = size/2, r = size/2 - 8, ir = r * 0.55;
    ctx.clearRect(0,0,size,size);
    let angle = -Math.PI/2;
    entries.forEach(([,amt],i) => {
      const slice = (amt/total) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,r,angle,angle+slice);
      ctx.closePath();
      ctx.fillStyle = colors[i%colors.length];
      ctx.fill();
      angle += slice;
    });
    ctx.beginPath();
    ctx.arc(cx,cy,ir,0,Math.PI*2);
    ctx.fillStyle = 'white';
    ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(fmt(total), cx, cy);
  } else if (summaryView === 'daily') {
    renderBarChart(el, getDailyData(viewMonth), '日別支出');
  } else if (summaryView === 'monthly') {
    renderBarChart(el, getMonthlyData(), '月別支出');
  } else if (summaryView === 'yearly') {
    renderBarChart(el, getYearlyData(), '年別支出');
  }
}

function getDailyData(ym) {
  const [y,m] = ym.split('-').map(Number);
  const days = new Date(y,m,0).getDate();
  const labels = [], vals = [];
  for(let d=1;d<=days;d++) {
    const date = `${ym}-${String(d).padStart(2,'0')}`;
    const recs = state.records.filter(r=>r.date===date && r.type==='expense');
    labels.push(d+'日');
    vals.push(recs.reduce((s,r)=>s+r.amount,0));
  }
  return {labels,vals};
}
function getMonthlyData() {
  const year = viewMonth.slice(0,4);
  const labels=[], vals=[];
  for(let m=1;m<=12;m++) {
    const ym = `${year}-${String(m).padStart(2,'0')}`;
    const recs = state.records.filter(r=>r.date&&r.date.startsWith(ym)&&r.type==='expense');
    labels.push(m+'月');
    vals.push(recs.reduce((s,r)=>s+r.amount,0));
  }
  return {labels,vals};
}
function getYearlyData() {
  const years = [...new Set(state.records.map(r=>r.date?r.date.slice(0,4):null).filter(Boolean))].sort();
  if (years.length === 0) return {labels:[],vals:[]};
  const labels=[], vals=[];
  years.forEach(y => {
    const recs = state.records.filter(r=>r.date&&r.date.startsWith(y)&&r.type==='expense');
    labels.push(y+'年');
    vals.push(recs.reduce((s,r)=>s+r.amount,0));
  });
  return {labels,vals};
}
function renderBarChart(el, {labels,vals}, title) {
  if (vals.every(v=>v===0)) { el.innerHTML=`<div class="empty-state"><div class="icon">📊</div>支出記録がありません</div>`; return; }
  const maxVal = Math.max(...vals) || 1;
  const barH = 16, gap = 6, padL = 48, padR = 16, padT = 10, padB = 30;
  const svgH = padT + (barH+gap) * labels.length + padB;
  const svgW = 320;
  let bars = '';
  labels.forEach((lbl,i) => {
    const y = padT + i * (barH+gap);
    const bw = ((vals[i]/maxVal) * (svgW - padL - padR)) || 0;
    const fill = vals[i] > 0 ? '#e8734a' : '#e0e0e0';
    bars += `<text x="${padL-4}" y="${y+barH*0.72}" text-anchor="end" font-size="11" fill="#666">${lbl}</text>`;
    bars += `<rect x="${padL}" y="${y}" width="${bw}" height="${barH}" rx="4" fill="${fill}" opacity="0.85"/>`;
    if(vals[i]>0) bars += `<text x="${padL+bw+4}" y="${y+barH*0.72}" font-size="10" fill="#333">${Math.round(vals[i]/1000)}k</text>`;
  });
  el.innerHTML = `<div class="chart-container"><svg viewBox="0 0 ${svgW} ${svgH}" width="100%" xmlns="http://www.w3.org/2000/svg">${bars}</svg></div>`;
}

// ========== CALENDAR ==========
function renderCalendar() {
  const [y,m] = calMonth.split('-').map(Number);
  document.getElementById('calMonthLabel').textContent = monthLabel(calMonth);
  const firstDay = new Date(y,m-1,1).getDay();
  const days = new Date(y,m,0).getDate();
  const DOW = ['日','月','火','水','木','金','土'];
  let html = DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<firstDay;i++) html += '<div></div>';
  const todayStr = today();
  for(let d=1;d<=days;d++) {
    const date = `${calMonth}-${String(d).padStart(2,'0')}`;
    const recs = getDayRecords(date);
    const expense = recs.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
    const hasMemo = !!state.dayMemos[date];
    const isToday = date===todayStr;
    const isSel = date===selectedCalDay;
    let cls = 'cal-day';
    if(isToday) cls += ' today';
    if(expense>0) cls += ' has-data';
    if(isSel) cls += ' selected';
    html += `<div class="${cls}" onclick="selectCalDay('${date}')">
      ${d}
      ${expense>0 ? `<span class="cal-amt">${Math.round(expense/1000)||'<1'}k</span>` : ''}
      ${hasMemo ? '<span class="memo-dot"></span>' : ''}
    </div>`;
  }
  document.getElementById('calGrid').innerHTML = html;

  if (selectedCalDay) {
    renderCalDetail(selectedCalDay);
  } else {
    document.getElementById('calDetail').style.display = 'none';
  }
}
function selectCalDay(date) {
  selectedCalDay = selectedCalDay === date ? null : date;
  renderCalendar();
}
function renderCalDetail(date) {
  const recs = getDayRecords(date);
  const memo = state.dayMemos[date] || '';
  const [y,m,d] = date.split('-');
  let html = `<div style="font-weight:700;font-size:14px;margin-bottom:8px">${parseInt(m)}月${parseInt(d)}日</div>`;
  if (recs.length === 0) {
    html += `<div style="font-size:13px;color:var(--text2);margin-bottom:10px">記録なし</div>`;
  } else {
    recs.forEach(r => {
      const cat = getCat(r.type, r.catId);
      html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px">
        <span>${cat.icon}</span>
        <span style="flex:1">${cat.name}${r.memo?' · '+r.memo:''}</span>
        <span style="font-weight:700;color:${r.type==='expense'?'var(--red)':'var(--green)'}">
          ${r.type==='expense'?'-':'+'} ${fmt(r.amount)}
        </span>
      </div>`;
    });
  }
  html += `<div style="margin-top:10px"><div style="font-size:12px;color:var(--text2);margin-bottom:5px">✦ この日のメモ</div>
    <textarea class="form-textarea" id="dayMemoInput" placeholder="この日のメモを書く…" style="min-height:60px">${memo}</textarea>
    <button onclick="saveDayMemo('${date}')" style="margin-top:6px;padding:8px 16px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:13px;cursor:pointer">保存</button>
  </div>`;
  const el = document.getElementById('calDetail');
  el.innerHTML = html;
  el.style.display = 'block';
}
function saveDayMemo(date) {
  const val = document.getElementById('dayMemoInput').value.trim();
  if (val) { state.dayMemos[date] = val; }
  else { delete state.dayMemos[date]; }
  saveData();
  renderCalendar();
}

// ========== TODO ==========
function renderTodo() {
  const el = document.getElementById('todoCard');
  if (state.todoLists.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="icon">📋</div>リストがありません</div>`;
    return;
  }
  let html = '';
  state.todoLists.forEach((list, li) => {
    const remaining = list.items.filter(i=>!i.done).length;
    html += `<div class="todo-list-section">
      <div class="todo-list-title">
        ${list.icon} ${list.name}
        ${remaining > 0 ? `<span class="badge">${remaining}</span>` : ''}
        <button onclick="deleteTodoList(${li})" style="margin-left:auto;background:none;border:none;color:#ccc;font-size:16px;cursor:pointer">🗑</button>
      </div>`;
    if (list.items.length === 0) {
      html += `<div style="font-size:13px;color:#bbb;padding:4px 0 8px">まだアイテムがありません</div>`;
    } else {
      list.items.forEach((item, ii) => {
        html += `<div class="todo-item">
          <button class="todo-check ${item.done?'checked':''}" onclick="toggleTodo(${li},${ii})">${item.done?'✓':''}</button>
          <span class="todo-text ${item.done?'done':''}">${escapeHtml(item.text)}</span>
          <button class="todo-del" onclick="deleteTodoItem(${li},${ii})">×</button>
        </div>`;
      });
    }
    html += `<div class="todo-input-row">
      <input type="text" placeholder="追加する…" id="todoInput_${li}" onkeydown="if(event.key==='Enter')addTodoItem(${li})">
      <button class="todo-add-btn" onclick="addTodoItem(${li})">追加</button>
    </div></div>`;
  });
  el.innerHTML = html;
  updateTodoBadge();
}
function toggleTodo(li, ii) {
  state.todoLists[li].items[ii].done = !state.todoLists[li].items[ii].done;
  saveData();
  renderTodo();
}
function deleteTodoItem(li, ii) {
  state.todoLists[li].items.splice(ii, 1);
  saveData();
  renderTodo();
}
function addTodoItem(li) {
  const input = document.getElementById('todoInput_' + li);
  const text = input.value.trim();
  if (!text) return;
  state.todoLists[li].items.push({ text, done: false });
  input.value = '';
  saveData();
  renderTodo();
}
function deleteTodoList(li) {
  if (!confirm(`「${state.todoLists[li].name}」を削除しますか？`)) return;
  state.todoLists.splice(li, 1);
  saveData();
  renderTodo();
}
function openNewListModal() {
  document.getElementById('newListIcon').value = '📝';
  document.getElementById('newListName').value = '';
  openModal('newListModal');
}
function saveNewList() {
  const icon = document.getElementById('newListIcon').value.trim() || '📝';
  const name = document.getElementById('newListName').value.trim();
  if (!name) { alert('リスト名を入力してください'); return; }
  state.todoLists.push({ id: Date.now().toString(), icon, name, items: [] });
  saveData();
  closeModal('newListModal');
  renderTodo();
}
function updateTodoBadge() {
  const total = state.todoLists.reduce((s,l)=>s+l.items.filter(i=>!i.done).length,0);
  const navBtn = document.getElementById('nav-todo');
  if (total > 0) navBtn.classList.add('has-dot');
  else navBtn.classList.remove('has-dot');
}
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ========== SETTINGS ==========
function renderSettings() {
  renderBgGrid();
  renderFixedList();
  renderCatLists();
}

// Background
const BG_PRESETS = [
  { id: 'none', label: 'なし', color: '#f5f0e8', overlay: 'rgba(245,240,232,0.0)' },
  { id: 'morning', label: '朝空', gradient: 'linear-gradient(135deg,#fceabb,#f8b500)', overlay: 'rgba(255,255,255,0.6)' },
  { id: 'ocean', label: '海', gradient: 'linear-gradient(135deg,#1a6b8a,#5ecde8)', overlay: 'rgba(255,255,255,0.55)' },
  { id: 'forest', label: '森', gradient: 'linear-gradient(135deg,#1a4731,#52b788)', overlay: 'rgba(255,255,255,0.6)' },
  { id: 'lavender', label: 'ラベンダー', gradient: 'linear-gradient(135deg,#7c6ca8,#c9b8e8)', overlay: 'rgba(255,255,255,0.6)' },
  { id: 'night', label: '夜空', gradient: 'linear-gradient(135deg,#0a0e27,#1a2a6c,#b21f1f)', overlay: 'rgba(0,0,0,0.3)' },
];
function renderBgGrid() {
  const el = document.getElementById('bgGrid');
  let html = '';
  BG_PRESETS.forEach(p => {
    const isSel = state.bgPreset === p.id;
    if (p.id === 'none') {
      html += `<div class="bg-option ${isSel?'selected':''}" onclick="setBgPreset('${p.id}')" style="background:${p.color};display:flex;align-items:center;justify-content:center;font-size:20px">
        ✕<div class="bg-label">${p.label}</div>
      </div>`;
    } else {
      html += `<div class="bg-option ${isSel?'selected':''}" onclick="setBgPreset('${p.id}')" style="background:${p.gradient}">
        <div class="bg-label">${p.label}</div>
      </div>`;
    }
  });
  if (state.bgImage && state.bgPreset === 'custom') {
    html += `<div class="bg-option selected" style="background-image:url(${state.bgImage});background-size:cover;background-position:center">
      <div class="bg-label">カスタム</div>
    </div>`;
  }
  el.innerHTML = html;
}
function setBgPreset(id) {
  state.bgPreset = id;
  if (id === 'none') {
    document.documentElement.style.setProperty('--bg-image', 'none');
    document.documentElement.style.setProperty('--bg-overlay', 'rgba(245,240,232,0.0)');
    document.body.style.background = '#f5f0e8';
  } else {
    const p = BG_PRESETS.find(b=>b.id===id);
    document.documentElement.style.setProperty('--bg-image', p.gradient);
    document.documentElement.style.setProperty('--bg-overlay', p.overlay);
    document.body.style.background = 'transparent';
  }
  saveData();
  renderBgGrid();
}
function handleBgUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    state.bgImage = e.target.result;
    state.bgPreset = 'custom';
    document.documentElement.style.setProperty('--bg-image', `url(${e.target.result})`);
    document.documentElement.style.setProperty('--bg-overlay', 'rgba(245,240,232,0.72)');
    document.body.style.background = 'transparent';
    saveData();
    renderBgGrid();
  };
  reader.readAsDataURL(file);
}
function applyBg() {
  const id = state.bgPreset;
  if (!id || id === 'none') {
    document.documentElement.style.setProperty('--bg-image', 'none');
    document.documentElement.style.setProperty('--bg-overlay', 'rgba(245,240,232,0.0)');
    return;
  }
  if (id === 'custom' && state.bgImage) {
    document.documentElement.style.setProperty('--bg-image', `url(${state.bgImage})`);
    document.documentElement.style.setProperty('--bg-overlay', 'rgba(245,240,232,0.72)');
    return;
  }
  const p = BG_PRESETS.find(b=>b.id===id);
  if (p) {
    document.documentElement.style.setProperty('--bg-image', p.gradient);
    document.documentElement.style.setProperty('--bg-overlay', p.overlay);
  }
}

// Fixed Items
function renderFixedList() {
  const el = document.getElementById('fixedList');
  if (state.fixedItems.length === 0) {
    el.innerHTML = '<div style="font-size:13px;color:#aaa;padding:4px 0">固定費・固定収入はありません</div>';
    return;
  }
  el.innerHTML = state.fixedItems.map((fi,i) => {
    const cat = getCat(fi.type, fi.catId);
    return `<div class="fixed-item">
      <span>${cat.icon}</span>
      <span style="flex:1">${fi.name}</span>
      <span style="font-size:12px;color:var(--text2)">${fi.day}日</span>
      <span style="font-weight:700;color:${fi.type==='expense'?'var(--red)':'var(--green)'}">${fmt(fi.amount)}</span>
      <button onclick="deleteFixed(${i})" style="background:none;border:none;color:#ccc;cursor:pointer;font-size:16px">×</button>
    </div>`;
  }).join('');
}
function openFixedModal() {
  fixedType = 'expense';
  fixedSelectedCat = null;
  document.getElementById('fixedName').value = '';
  document.getElementById('fixedAmount').value = '';
  document.getElementById('fixedDay').value = '';
  document.getElementById('fixedTypeExpense').className = 'toggle-btn active-expense';
  document.getElementById('fixedTypeIncome').className = 'toggle-btn';
  renderFixedCats();
  openModal('fixedModal');
}
function setFixedType(t) {
  fixedType = t;
  fixedSelectedCat = null;
  document.getElementById('fixedTypeExpense').className = 'toggle-btn' + (t==='expense'?' active-expense':'');
  document.getElementById('fixedTypeIncome').className = 'toggle-btn' + (t==='income'?' active-income':'');
  renderFixedCats();
}
function renderFixedCats() {
  const cats = state.categories[fixedType] || [];
  document.getElementById('fixedCatsGrid').innerHTML = cats.map(c =>
    `<button class="cat-btn ${fixedSelectedCat===c.id?'selected':''}" onclick="selectFixedCat('${c.id}')">
      <span class="emoji">${c.icon}</span><span>${c.name}</span>
    </button>`
  ).join('');
}
function selectFixedCat(id) {
  fixedSelectedCat = id;
  renderFixedCats();
}
function saveFixed() {
  const name = document.getElementById('fixedName').value.trim();
  const amount = parseInt(document.getElementById('fixedAmount').value);
  const day = parseInt(document.getElementById('fixedDay').value);
  if (!name || !amount || !day || !fixedSelectedCat) { alert('すべて入力してください'); return; }
  state.fixedItems.push({ id: Date.now().toString(), name, amount, type: fixedType, catId: fixedSelectedCat, day });
  saveData();
  closeModal('fixedModal');
  renderFixedList();
}
function deleteFixed(i) {
  if (!confirm('削除しますか？')) return;
  state.fixedItems.splice(i,1);
  saveData();
  renderFixedList();
}

// Categories
function renderCatLists() {
  ['expense','income'].forEach(type => {
    const id = type==='expense' ? 'expenseCatList' : 'incomeCatList';
    const el = document.getElementById(id);
    const cats = state.categories[type] || [];
    el.innerHTML = cats.map((c,i) =>
      `<span class="tag-chip">
        <input type="text" value="${c.icon}" style="width:26px;border:none;background:none;font-size:16px;text-align:center;outline:none"
          onchange="updateCatIcon('${type}',${i},this.value)">
        ${c.name}
        <button class="chip-del" onclick="deleteCat('${type}',${i})">×</button>
      </span>`
    ).join('');
  });
}
function updateCatIcon(type, i, val) {
  state.categories[type][i].icon = val.trim() || '📦';
  saveData();
}
function deleteCat(type, i) {
  if (!confirm('削除しますか？')) return;
  state.categories[type].splice(i,1);
  saveData();
  renderCatLists();
}
function openCatModal() {
  document.getElementById('catIcon').value = '';
  document.getElementById('catName').value = '';
  openModal('catModal');
}
function saveCat() {
  const icon = document.getElementById('catIcon').value.trim() || '📦';
  const name = document.getElementById('catName').value.trim();
  const type = document.getElementById('catType').value;
  if (!name) { alert('カテゴリ名を入力してください'); return; }
  state.categories[type].push({ id: 'c_' + Date.now(), icon, name });
  saveData();
  closeModal('catModal');
  renderCatLists();
}

// ========== MODAL ==========
function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => {
    if (e.target === el) closeModal(el.id);
  });
});

// ========== INIT ==========
async function init() {
  document.getElementById('loadingScreen').style.display = 'flex';
  await loadData();
  viewMonth = state.currentMonth || new Date().toISOString().slice(0,7);
  calMonth = viewMonth;
  applyFixedItems();
  applyBg();
  updateHeader();
  renderLedger();
  updateTodoBadge();
  document.getElementById('loadingScreen').style.display = 'none';
}
init();
</script>
