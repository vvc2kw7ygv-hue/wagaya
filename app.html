<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>わが家の通帳</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Hiragino Sans",sans-serif;background:#f5f0e8;color:#1a1a1a;min-height:100vh;}
#loading{position:fixed;inset:0;background:#2c5f8a;color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;}
#loading h1{font-size:20px;}
#loading p{font-size:14px;opacity:0.8;}
#app{display:none;}
.header{background:#2c5f8a;color:white;padding:14px 16px;position:sticky;top:0;z-index:10;}
.header h1{font-size:17px;font-weight:700;}
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #eee;display:flex;padding-bottom:env(safe-area-inset-bottom);}
.tab-btn{flex:1;padding:10px 0 8px;font-size:10px;color:#999;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
.tab-btn.active{color:#2c5f8a;}
.main{padding:12px 12px 80px;}
.card{background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.08);margin-bottom:12px;overflow:hidden;}
.sum-row{display:flex;padding:14px;}
.sum-item{flex:1;text-align:center;}
.sum-label{font-size:11px;color:#666;margin-bottom:4px;}
.sum-val{font-size:18px;font-weight:700;}
.sum-val.inc{color:#3a7d44;}
.sum-val.exp{color:#c0392b;}
.sum-val.bal{color:#2c5f8a;}
.rec-item{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid #f0f0f0;gap:10px;}
.rec-item:last-child{border-bottom:none;}
.rec-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.rec-icon.expense{background:rgba(192,57,43,0.1);}
.rec-icon.income{background:rgba(58,125,68,0.1);}
.rec-meta{flex:1;}
.rec-cat{font-size:13px;font-weight:600;}
.rec-memo{font-size:11px;color:#666;margin-top:1px;}
.rec-right{text-align:right;}
.rec-amt{font-size:15px;font-weight:700;}
.rec-amt.expense{color:#c0392b;}
.rec-amt.income{color:#3a7d44;}
.rec-date{font-size:11px;color:#666;margin-top:1px;}
.empty{text-align:center;padding:40px 20px;color:#999;font-size:14px;}
.fab{position:fixed;bottom:calc(64px + env(safe-area-inset-bottom));right:16px;width:52px;height:52px;border-radius:50%;background:#e8734a;color:white;border:none;font-size:26px;box-shadow:0 4px 16px rgba(232,115,74,0.4);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:none;align-items:flex-end;}
.modal-bg.open{display:flex;}
.modal{background:white;border-radius:20px 20px 0 0;width:100%;max-height:85vh;overflow-y:auto;padding:0 16px calc(20px + env(safe-area-inset-bottom));}
.modal-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:12px auto 16px;}
.modal-title{font-size:17px;font-weight:700;text-align:center;margin-bottom:16px;}
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;color:#666;margin-bottom:5px;display:block;}
.form-input,.form-select{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:10px;font-size:15px;font-family:inherit;background:#fafafa;outline:none;appearance:none;}
.form-input:focus,.form-select:focus{border-color:#2c5f8a;}
.type-row{display:flex;background:#f0f0f0;border-radius:10px;padding:3px;margin-bottom:14px;}
.type-btn{flex:1;padding:8px;border:none;background:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;}
.type-btn.exp-active{background:white;color:#c0392b;box-shadow:0 1px 4px rgba(0,0,0,0.12);}
.type-btn.inc-active{background:white;color:#3a7d44;box-shadow:0 1px 4px rgba(0,0,0,0.12);}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.cat-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border-radius:10px;border:2px solid transparent;background:#f5f5f5;cursor:pointer;font-size:11px;color:#666;}
.cat-btn .em{font-size:22px;}
.cat-btn.sel{border-color:#2c5f8a;background:rgba(44,95,138,0.08);color:#2c5f8a;}
.save-btn{width:100%;padding:14px;background:#2c5f8a;color:white;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px;}
.cancel-btn{width:100%;padding:10px;background:none;border:none;color:#999;font-size:14px;cursor:pointer;margin-top:6px;}
.mn{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 0;}
.mn button{background:none;border:none;font-size:20px;cursor:pointer;color:#2c5f8a;padding:4px 10px;}
.mn span{font-size:15px;font-weight:600;}
.sync{font-size:11px;color:rgba(255,255,255,0.7);text-align:right;min-height:16px;}
</style>
</head>
<body>

<div id="loading">
  <div style="font-size:48px">📒</div>
  <h1 id="loadTitle">わが家の通帳</h1>
  <p id="loadMsg">起動中…</p>
</div>

<div id="app">
<div class="header">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;">
    <div>
      <div style="font-size:17px;font-weight:700">📒 わが家の通帳</div>
      <div style="font-size:11px;opacity:0.75;margin-top:1px" id="hMonth"></div>
    </div>
    <div style="text-align:right">
      <div class="sync" id="syncMsg"></div>
      <div style="font-size:19px;font-weight:700" id="hBal">¥0</div>
    </div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" id="tab-ledger-btn" onclick="showTab('ledger')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
    台帳
  </button>
  <button class="tab-btn" id="tab-summary-btn" onclick="showTab('summary')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
    集計
  </button>
  <button class="tab-btn" id="tab-settings-btn" onclick="showTab('settings')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
    設定
  </button>
</div>

<button class="fab" id="fabBtn" onclick="openAddModal()">＋</button>

<div class="main">
  <!-- 台帳 -->
  <div id="tab-ledger">
    <div class="mn">
      <button onclick="changeMonth(-1)">&#8249;</button>
      <span id="ledgerMonth"></span>
      <button onclick="changeMonth(1)">&#8250;</button>
    </div>
    <div class="card" style="margin-top:10px">
      <div class="sum-row" id="sumRow"></div>
    </div>
    <div class="card" id="recList"></div>
  </div>

  <!-- 集計（シンプル） -->
  <div id="tab-summary" style="display:none">
    <div class="mn">
      <button onclick="changeMonth(-1)">&#8249;</button>
      <span id="summaryMonth"></span>
      <button onclick="changeMonth(1)">&#8250;</button>
    </div>
    <div class="card" style="margin-top:10px;padding:14px" id="summaryContent"></div>
  </div>

  <!-- 設定 -->
  <div id="tab-settings" style="display:none">
    <div class="card" style="padding:14px">
      <div style="font-size:13px;font-weight:700;color:#2c5f8a;margin-bottom:10px">📊 データ情報</div>
      <div id="dataInfo" style="font-size:13px;color:#666;line-height:2"></div>
    </div>
  </div>
</div>
</div>

<!-- 記録追加モーダル -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">記録を追加</div>
    <div class="type-row">
      <button class="type-btn exp-active" id="typeExp" onclick="setType('expense')">💸 支出</button>
      <button class="type-btn" id="typeInc" onclick="setType('income')">💰 収入</button>
    </div>
    <div class="form-group">
      <label class="form-label">日付</label>
      <input type="date" class="form-input" id="addDate">
    </div>
    <div class="form-group">
      <label class="form-label">金額（円）</label>
      <input type="number" class="form-input" id="addAmt" placeholder="0" inputmode="numeric">
    </div>
    <div class="form-group">
      <label class="form-label">カテゴリ</label>
      <div class="cat-grid" id="catGrid"></div>
    </div>
    <div class="form-group">
      <label class="form-label">メモ（任意）</label>
      <input type="text" class="form-input" id="addMemo" placeholder="例: スーパーで買い物">
    </div>
    <button class="save-btn" onclick="saveRecord()">保存する</button>
    <button class="cancel-btn" onclick="closeModal()">キャンセル</button>
  </div>
</div>

<script>
var FB = 'https://wagaya-32f81-default-rtdb.firebaseio.com/wagaya/data.json';
var state = {
  records: [],
  categories: {
    expense: [
      {id:'eating_out',icon:'🍽️',name:'外食費'},
      {id:'cooking',icon:'🍚',name:'自炊費'},
      {id:'muscle',icon:'💪',name:'筋肉費'},
      {id:'housing',icon:'🏠',name:'住居費'},
      {id:'daily2',icon:'📦',name:'日用雑貨費'},
      {id:'water',icon:'💧',name:'水道光熱費'},
      {id:'car',icon:'🚗',name:'車両費'},
      {id:'leisure',icon:'🎸',name:'趣味・レジャー費'},
      {id:'food',icon:'🍱',name:'食費'},
      {id:'daily',icon:'🧴',name:'日用品'},
      {id:'util',icon:'💡',name:'光熱費'},
      {id:'med',icon:'💊',name:'医療'},
      {id:'tr',icon:'🚃',name:'交通費'},
      {id:'oe',icon:'📦',name:'その他'}
    ],
    income: [
      {id:'sal',icon:'💼',name:'給与'},
      {id:'sid',icon:'💻',name:'副収入'},
      {id:'oi',icon:'🎁',name:'その他収入'}
    ]
  }
};
var viewMonth = new Date().toISOString().slice(0,7);
var currentType = 'expense';
var selectedCat = null;
var activeTab = 'ledger';

function fmt(n) {
  var abs = Math.abs(Math.round(n));
  return (n >= 0 ? '¥' : '-¥') + abs.toLocaleString('ja-JP');
}
function today() { return new Date().toISOString().slice(0,10); }
function ml(ym) {
  var parts = ym.split('-');
  return parts[0] + '年' + parseInt(parts[1]) + '月';
}
function getMonthRecs(ym) {
  return state.records.filter(function(r){ return r.date && r.date.indexOf(ym) === 0; });
}
function getCat(type, id) {
  var cats = state.categories[type] || [];
  for (var i = 0; i < cats.length; i++) {
    if (cats[i].id === id) return cats[i];
  }
  return {icon:'📦', name:'その他'};
}

function showSync(msg) {
  var el = document.getElementById('syncMsg');
  el.textContent = msg;
  setTimeout(function(){ el.textContent = ''; }, 2000);
}

function fbLoad(cb) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', FB);
  xhr.onload = function() {
    try {
      var d = JSON.parse(xhr.responseText);
      cb(null, d);
    } catch(e) { cb(e, null); }
  };
  xhr.onerror = function() { cb(new Error('Network error'), null); };
  xhr.send();
}
function fbSave(cb) {
  var xhr = new XMLHttpRequest();
  xhr.open('PUT', FB);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onload = function() { if(cb) cb(null); };
  xhr.onerror = function() { if(cb) cb(new Error('Save failed')); };
  xhr.send(JSON.stringify(state));
}

function startApp() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderAll();
}

function mergeData(d) {
  if (!d) return;
  if (d.records) state.records = d.records;
  if (d.categories) {
    if (d.categories.expense) state.categories.expense = d.categories.expense;
    if (d.categories.income) state.categories.income = d.categories.income;
  }
}

function init() {
  document.getElementById('loadMsg').textContent = 'データを取得中…';
  fbLoad(function(err, d) {
    if (!err && d) {
      mergeData(d);
    }
    startApp();
  });
}

function renderAll() {
  renderHeader();
  if (activeTab === 'ledger') renderLedger();
  if (activeTab === 'summary') renderSummary();
  if (activeTab === 'settings') renderSettings();
}

function renderHeader() {
  document.getElementById('hMonth').textContent = ml(viewMonth);
  var recs = getMonthRecs(viewMonth);
  var inc = 0, exp = 0;
  for (var i = 0; i < recs.length; i++) {
    if (recs[i].type === 'income') inc += recs[i].amount;
    else exp += recs[i].amount;
  }
  var bal = inc - exp;
  var el = document.getElementById('hBal');
  el.textContent = fmt(bal);
  el.style.color = bal >= 0 ? '#7ecf88' : '#f08a7a';
}

function changeMonth(d) {
  var parts = viewMonth.split('-').map(Number);
  var dt = new Date(parts[0], parts[1] - 1 + d);
  viewMonth = dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2, '0');
  renderAll();
}

function renderLedger() {
  document.getElementById('ledgerMonth').textContent = ml(viewMonth);
  var recs = getMonthRecs(viewMonth).sort(function(a,b){ return b.date < a.date ? -1 : 1; });
  var inc = 0, exp = 0;
  for (var i = 0; i < recs.length; i++) {
    if (recs[i].type === 'income') inc += recs[i].amount;
    else exp += recs[i].amount;
  }
  var bal = inc - exp;
  document.getElementById('sumRow').innerHTML =
    '<div class="sum-item"><div class="sum-label">収入</div><div class="sum-val inc">' + fmt(inc) + '</div></div>' +
    '<div class="sum-item"><div class="sum-label">支出</div><div class="sum-val exp">' + fmt(exp) + '</div></div>' +
    '<div class="sum-item"><div class="sum-label">収支</div><div class="sum-val bal">' + fmt(bal) + '</div></div>';

  if (recs.length === 0) {
    document.getElementById('recList').innerHTML = '<div class="empty">📭 この月の記録はありません<br><small>右下の ＋ から追加できます</small></div>';
    return;
  }
  var h = '';
  for (var i = 0; i < recs.length; i++) {
    var r = recs[i];
    var cat = getCat(r.type, r.catId);
    var d = r.date ? r.date.slice(5).replace('-', '/') : '';
    var sign = r.type === 'expense' ? '-' : '+';
    h += '<div class="rec-item">' +
      '<div class="rec-icon ' + r.type + '">' + cat.icon + '</div>' +
      '<div class="rec-meta"><div class="rec-cat">' + cat.name + '</div><div class="rec-memo">' + (r.memo || '　') + '</div></div>' +
      '<div class="rec-right"><div class="rec-amt ' + r.type + '">' + sign + ' ' + fmt(r.amount) + '</div><div class="rec-date">' + d + '</div></div>' +
      '<button onclick="delRec('' + r.id + '')" style="background:none;border:none;color:#ddd;font-size:18px;cursor:pointer;padding:4px;flex-shrink:0">×</button>' +
      '</div>';
  }
  document.getElementById('recList').innerHTML = h;
}

function delRec(id) {
  if (!confirm('削除しますか？')) return;
  state.records = state.records.filter(function(r){ return r.id !== id; });
  fbSave(function(){ showSync('✓ 保存済み'); });
  renderAll();
}

function renderSummary() {
  document.getElementById('summaryMonth').textContent = ml(viewMonth);
  var recs = getMonthRecs(viewMonth);
  var totals = {};
  for (var i = 0; i < recs.length; i++) {
    var r = recs[i];
    if (r.type === 'expense') {
      totals[r.catId] = (totals[r.catId] || 0) + r.amount;
    }
  }
  var keys = Object.keys(totals).sort(function(a,b){ return totals[b] - totals[a]; });
  if (keys.length === 0) {
    document.getElementById('summaryContent').innerHTML = '<div class="empty" style="padding:20px">支出記録がありません</div>';
    return;
  }
  var total = 0;
  for (var i = 0; i < keys.length; i++) total += totals[keys[i]];
  var h = '<div style="font-size:13px;color:#666;margin-bottom:10px">支出合計: <strong>' + fmt(total) + '</strong></div>';
  for (var i = 0; i < keys.length; i++) {
    var cat = getCat('expense', keys[i]);
    var pct = Math.round(totals[keys[i]] / total * 100);
    var barW = pct;
    h += '<div style="margin-bottom:10px">' +
      '<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">' +
      '<span>' + cat.icon + ' ' + cat.name + '</span>' +
      '<span style="font-weight:700">' + fmt(totals[keys[i]]) + ' (' + pct + '%)</span>' +
      '</div>' +
      '<div style="background:#f0f0f0;border-radius:4px;height:8px">' +
      '<div style="background:#e8734a;border-radius:4px;height:8px;width:' + barW + '%"></div>' +
      '</div></div>';
  }
  document.getElementById('summaryContent').innerHTML = h;
}

function renderSettings() {
  var total = state.records.length;
  var months = {};
  for (var i = 0; i < state.records.length; i++) {
    var ym = state.records[i].date ? state.records[i].date.slice(0,7) : '?';
    months[ym] = (months[ym] || 0) + 1;
  }
  var info = '総記録件数: ' + total + '件<br>';
  var mkeys = Object.keys(months).sort();
  for (var i = 0; i < mkeys.length; i++) {
    info += ml(mkeys[i]) + ': ' + months[mkeys[i]] + '件<br>';
  }
  document.getElementById('dataInfo').innerHTML = info;
}

function showTab(tab) {
  var tabs = ['ledger', 'summary', 'settings'];
  for (var i = 0; i < tabs.length; i++) {
    document.getElementById('tab-' + tabs[i]).style.display = tabs[i] === tab ? 'block' : 'none';
    var btn = document.getElementById('tab-' + tabs[i] + '-btn');
    if (btn) { btn.className = 'tab-btn' + (tabs[i] === tab ? ' active' : ''); }
  }
  document.getElementById('fabBtn').style.display = tab === 'ledger' ? 'flex' : 'none';
  activeTab = tab;
  renderAll();
}

function openAddModal() {
  currentType = 'expense';
  selectedCat = null;
  document.getElementById('addDate').value = today();
  document.getElementById('addAmt').value = '';
  document.getElementById('addMemo').value = '';
  document.getElementById('typeExp').className = 'type-btn exp-active';
  document.getElementById('typeInc').className = 'type-btn';
  renderCatGrid();
  document.getElementById('addModal').className = 'modal-bg open';
}
function closeModal() {
  document.getElementById('addModal').className = 'modal-bg';
}
document.getElementById('addModal').addEventListener('click', function(e){
  if (e.target === this) closeModal();
});
function setType(t) {
  currentType = t;
  selectedCat = null;
  document.getElementById('typeExp').className = 'type-btn' + (t === 'expense' ? ' exp-active' : '');
  document.getElementById('typeInc').className = 'type-btn' + (t === 'income' ? ' inc-active' : '');
  renderCatGrid();
}
function renderCatGrid() {
  var cats = state.categories[currentType] || [];
  var h = '';
  for (var i = 0; i < cats.length; i++) {
    var c = cats[i];
    h += '<button class="cat-btn' + (selectedCat === c.id ? ' sel' : '') + '" onclick="selCat('' + c.id + '')">' +
      '<span class="em">' + c.icon + '</span><span>' + c.name + '</span></button>';
  }
  document.getElementById('catGrid').innerHTML = h;
}
function selCat(id) { selectedCat = id; renderCatGrid(); }
function saveRecord() {
  var date = document.getElementById('addDate').value;
  var amount = parseInt(document.getElementById('addAmt').value);
  var memo = document.getElementById('addMemo').value.trim();
  if (!date || !amount || amount <= 0) { alert('日付と金額を入力してください'); return; }
  if (!selectedCat) { alert('カテゴリを選択してください'); return; }
  state.records.push({
    id: String(Date.now()),
    date: date, amount: amount,
    type: currentType, catId: selectedCat, memo: memo
  });
  fbSave(function(){ showSync('✓ 保存済み'); });
  closeModal();
  renderAll();
}

// 30秒ごとに同期
setInterval(function() {
  fbLoad(function(err, d) {
    if (!err && d) {
      mergeData(d);
      renderAll();
      showSync('🔄 同期しました');
    }
  });
}, 30000);

init();
</script>
</body>
</html>
